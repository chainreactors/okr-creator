name: OKR Daily Review

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  okr-review:
    runs-on: ubuntu-latest
    env:
      OKR_AGENT: ${{ vars.OKR_AGENT || 'claude' }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code
        if: env.OKR_AGENT == 'claude'
        run: npm install -g @anthropic-ai/claude-code

      - name: OKR Review (Claude Code)
        if: env.OKR_AGENT == 'claude'
        id: claude-review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ vars.ANTHROPIC_BASE_URL || '' }}
        run: |
          MODEL="${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}"
          PROMPT=$(cat .github/prompts/okr-review.md)
          RESULT=$(claude -p "$PROMPT" --model "$MODEL" --output-format text 2>&1) || true
          echo "$RESULT" > /tmp/okr-review-output.txt

      - name: Install Codex
        if: env.OKR_AGENT == 'codex'
        run: npm install -g @openai/codex

      - name: OKR Review (Codex)
        if: env.OKR_AGENT == 'codex'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          RESULT=$(codex exec --prompt-file .github/prompts/okr-review.md --approval-mode full-auto 2>&1) || true
          echo "$RESULT" > /tmp/okr-review-output.txt

      - name: Extract PROGRESS.md update
        id: extract-progress
        run: |
          if [ -f /tmp/okr-review-output.txt ]; then
            # Extract content between PROGRESS markers
            sed -n '/^---PROGRESS_START---$/,/^---PROGRESS_END---$/p' /tmp/okr-review-output.txt \
              | sed '1d;$d' > /tmp/okr-progress-update.md

            if [ -s /tmp/okr-progress-update.md ]; then
              echo "has_progress=true" >> "$GITHUB_OUTPUT"
            else
              echo "has_progress=false" >> "$GITHUB_OUTPUT"
            fi

            # Remove PROGRESS block from review output (keep only the report for Issue)
            sed '/^---PROGRESS_START---$/,/^---PROGRESS_END---$/d' /tmp/okr-review-output.txt \
              > /tmp/okr-review-clean.txt
            mv /tmp/okr-review-clean.txt /tmp/okr-review-output.txt
          else
            echo "has_progress=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or Update OKR Review Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          AGENT="${OKR_AGENT}"
          MONTH=$(date -u +%-m)
          QUARTER="$(date -u +%Y)-Q$(( (MONTH - 1) / 3 + 1 ))"
          ISSUE_TITLE="[OKR Review] ${QUARTER} 进度追踪"

          EXISTING_ISSUE=$(gh issue list --label "okr-review" --state open --json number,title \
            --jq ".[] | select(.title == \"${ISSUE_TITLE}\") | .number" 2>/dev/null || echo "")

          # Build comment body via file concatenation to avoid shell expansion issues
          {
            echo "## OKR 每日评估 — ${TODAY}"
            echo ""
            echo "> Agent: \`${AGENT}\` | [Workflow Run](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID})"
            echo ""
            if [ -f /tmp/okr-review-output.txt ] && [ -s /tmp/okr-review-output.txt ]; then
              cat /tmp/okr-review-output.txt
            else
              echo "Agent produced no output."
            fi
            echo ""
            echo "---"
            echo ""
            echo "**想继续讨论？** 直接在下方评论，使用 \`@claude\` 或 \`@codex\` 开头即可触发 AI 回复。"
          } > /tmp/okr-comment-body.md

          if [ -n "$EXISTING_ISSUE" ]; then
            gh issue comment "$EXISTING_ISSUE" --body-file /tmp/okr-comment-body.md
          else
            {
              echo "# ${ISSUE_TITLE}"
              echo ""
              echo "本 Issue 自动追踪本季度 OKR 完成进度。"
              echo ""
              echo "- OKR 文件: \`.claude/skills/okr/SKILL.md\`"
              echo "- 进展文件: \`.claude/skills/okr/PROGRESS.md\`"
              echo "- Agent: \`${AGENT}\`"
              echo "- 自动评估: 每日 UTC 02:00"
              echo "- 对话: 评论中 \`@claude\` 或 \`@codex\` 开头即可触发 AI 回复"
              echo ""
              echo "---"
            } > /tmp/okr-issue-body.md

            NEW_ISSUE=$(gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file /tmp/okr-issue-body.md \
              --label "okr-review" 2>&1) || true

            ISSUE_NUM=$(echo "$NEW_ISSUE" | grep -oE '[0-9]+$' || echo "")
            if [ -n "$ISSUE_NUM" ]; then
              gh issue comment "$ISSUE_NUM" --body-file /tmp/okr-comment-body.md || true
            fi
          fi

      - name: Update PROGRESS.md and create PR
        if: steps.extract-progress.outputs.has_progress == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          BRANCH="okr-review/${TODAY}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete remote branch if exists (re-run on same day)
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"

          mkdir -p .claude/skills/okr
          cp /tmp/okr-progress-update.md .claude/skills/okr/PROGRESS.md

          git add .claude/skills/okr/PROGRESS.md
          git commit -m "chore(okr): update progress ${TODAY}" || exit 0
          git push origin "$BRANCH"

          # Check if PR already exists for today
          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "[OKR Review] ${TODAY} 进展更新" \
              --body "每日 OKR 评审自动生成的进展更新。合并后 PROGRESS.md 将更新到最新状态。" \
              --label "okr-review" \
              --base main
          fi
